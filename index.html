<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>SpacePioneers</title>

<style>
body{
    font-family: Arial;
    text-align:center;
}

.nav-btn{
    font-size:24px;
    padding:15px 30px;
    margin:10px;
}

.planet{
    width:120px;
    cursor:pointer;
    margin:10px;
}

.info{
    display:none;
    border:1px solid black;
    padding:10px;
    margin:10px;
}

.question{
    display:none;
}

.active{
    display:block;
}
</style>
</head>
<body>

<h1>🚀 SpacePioneers</h1>

<button class="nav-btn">◀ Önceki Sayfa</button>
<button class="nav-btn">Sonraki Sayfa ▶</button>

<h2>☀️ Güneş Sistemi</h2>

<img src="sun.png" width="250">

<div>
    <img src="mercury.png" class="planet"
    onclick="toggleInfo('mercury')">

    <div id="mercury" class="info">
        <h3>Merkür</h3>
        <p>Güneş'e en yakın gezegendir.</p>
    </div>

    <img src="venus.png" class="planet"
    onclick="toggleInfo('venus')">

    <div id="venus" class="info">
        <h3>Venüs</h3>
        <p>En sıcak gezegendir.</p>
    </div>
</div>

<hr>

<h2>🎮 Oyun Bölümü</h2>

<p>Puan: <span id="score">0</span></p>

<div id="q1" class="question active">
    <p>1) Dünya'nın uydusu nedir?</p>
    <button onclick="answer(true,1)">Ay</button>
    <button onclick="answer(false,1)">Mars</button>
</div>

<div id="q2" class="question">
    <p>2) Güneş Sistemi'nin en büyük gezegeni hangisidir?</p>
    <button onclick="answer(true,2)">Jüpiter</button>
    <button onclick="answer(false,2)">Merkür</button>
</div>

<div id="q3" class="question">
    <p>3) Satürn'ün en belirgin özelliği nedir?</p>
    <button onclick="answer(true,3)">Halkaları</button>
    <button onclick="answer(false,3)">Mavi rengi</button>
</div>

<hr>

<h2>🧠 Beyin Bölümü</h2>

<div>
    <p>Dünya Güneş'in etrafında döner.</p>
    <button onclick="brain(true)">Doğru</button>
    <button onclick="brain(false)">Yanlış</button>
</div>

<script>
let score = 0;

function updateScore(){
    document.getElementById("score").textContent = score;
}

function toggleInfo(id){
    let info = document.getElementById(id);

    if(info.style.display==="block"){
        info.style.display="none";
    }else{
        info.style.display="block";
    }
}

function answer(correct, q){
    if(correct){
        score += 10;

        document.getElementById("q"+q).style.display="none";

        let next =
        document.getElementById("q"+(q+1));

        if(next){
            next.style.display="block";
        }
    }else{
        score -= 15;
        alert("Yanlış cevap! -15 puan");
    }

    updateScore();
}

function brain(isCorrect){
    if(isCorrect){
        score += 10;
        alert("Doğru! +10 puan");
    }else{
        score -= 15;
        alert("Yanlış! -15 puan");
    }

    updateScore();
}
</script>

</body>
</html>
