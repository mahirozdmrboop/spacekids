<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>SpaceKids</title>

<style>
body{
    font-family:Arial;
    text-align:center;
    background:#0b1026;
    color:white;
}

.page{
    display:none;
}

.active{
    display:block;
}

button{
    padding:15px 30px;
    font-size:20px;
    margin:10px;
    cursor:pointer;
}

.planet{
    width:120px;
    margin:10px;
    cursor:pointer;
}

.info{
    display:none;
    background:white;
    color:black;
    padding:10px;
    margin:10px auto;
    width:300px;
}
</style>
</head>
<body>

<!-- ANA SAYFA -->

<div id="home" class="page active">

<h1>🚀 SpaceKids</h1>

<h2>Puan: <span id="score">0</span></h2>

<h2 id="medal">Henüz madalya yok</h2>

<button onclick="showPage('solar')">
☀️ Güneş Sistemi
</button>

<button onclick="showPage('game')">
🎮 Oyun
</button>

<button onclick="showPage('brain')">
🧠 Beyin
</button>

</div>

<!-- GÜNEŞ SİSTEMİ -->

<div id="solar" class="page">

<h1>☀️ Güneş Sistemi</h1>

<img src="sun.png" width="250">

<br><br>

<img src="earth.png"
class="planet"
onclick="togglePlanet('earth')">

<div id="earth" class="info">
🌍 Dünya

<br>
Güneş'ten 3. gezegendir.
<br>
1 uydusu vardır.
</div>

<br>

<button onclick="showPage('home')">
🏠 Ana Sayfa
</button>

</div>

<!-- OYUN -->

<div id="game" class="page">

<h1>🎮 Oyun</h1>

<div id="gameQuestion">
1. Dünya'nın uydusu nedir?
<br><br>

<button onclick="answer(true)">
Ay
</button>

<button onclick="answer(false)">
Mars
</button>
</div>

<button onclick="showPage('home')">
🏠 Ana Sayfa
</button>

</div>

<!-- BEYİN -->

<div id="brain" class="page">

<h1>🧠 Beyin</h1>

<div id="brainQuestion">
Dünya Güneş'in etrafında döner.

<br><br>

<button onclick="brainAnswer(true)">
Doğru
</button>

<button onclick="brainAnswer(false)">
Yanlış
</button>
</div>

<button onclick="showPage('home')">
🏠 Ana Sayfa
</button>

</div>

<script>

let score = 0;

function showPage(page){

document.querySelectorAll(".page")
.forEach(p=>p.classList.remove("active"));

document
.getElementById(page)
.classList.add("active");

}

function togglePlanet(id){

let planet =
document.getElementById(id);

planet.style.display =
planet.style.display==="block"
? "none"
: "block";

}

function updateScore(){

document
.getElementById("score")
.innerText = score;

let medal =
document.getElementById("medal");

if(score >= 150){

medal.innerHTML =
"🥇 Altın Madalya";

}

else if(score >= 100){

medal.innerHTML =
"🥈 Gümüş Madalya";

}

else if(score >= 50){

medal.innerHTML =
"🥉 Bronz Madalya";

}

else{

medal.innerHTML =
"😢 Maalesef bir şey yok";

}

}

function answer(correct){

if(correct){

score += 10;
alert("Doğru! +10");

}else{

score -= 15;
alert("Yanlış! -15");

}

updateScore();

}

function brainAnswer(correct){

if(correct){

score += 10;
alert("Doğru! +10");

}else{

score -= 15;
alert("Yanlış! -15");

}

updateScore();

}

</script>

</body>
</html>
